const orgNames={nettetal:"GAME GALAXY NETTETAL",brüggen:"GAME GALAXY BRÜGGEN",viersen:"GAME GALAXY VIERSEN",köln:"GAME GALAXY KÖLN"};
document.getElementById("hdr-org").textContent=orgNames[currentLager]||"GAME GALAXY";
document.getElementById("hdr-username").textContent=currentUser;
document.getElementById("sidebar-org").textContent=orgNames[currentLager]||"GAME GALAXY";
document.getElementById("sidebar-user").textContent=currentUser;
if(localStorage.getItem("gg_role")==="MitarbeiterPlus") document.getElementById("nav-plus-inv-side").style.display="";
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("sidebar-overlay").classList.toggle("open")}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("sidebar-overlay").classList.remove("open")}
function toggleUserDD(){const d=document.getElementById("user-dd");d.style.display=d.style.display==="block"?"none":"block"}
function logoutUser(){localStorage.removeItem("gg_user");localStorage.removeItem("gg_role");window.location.href="gg-portal.html"}
document.addEventListener("click",e=>{const d=document.getElementById("user-dd");if(!d.contains(e.target)&&!document.querySelector(".hdr-user").contains(e.target))d.style.display="none"});
const showSpinner=()=>document.getElementById("spinner").classList.add("show");
const hideSpinner=()=>document.getElementById("spinner").classList.remove("show");
function showToast(msg,color="var(--neon-green)"){const t=document.getElementById("toast");t.textContent=msg;t.style.color=color;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000)}
async function loadData(){
  currentZeitraum=document.getElementById("sel-zeitraum").value;
  showSpinner();
  try{
    anfangsbestand={};
    const abDoc=await db.collection("anfangsbestand").doc(currentLager+"_"+currentZeitraum).get();
    if(abDoc.exists) anfangsbestand=abDoc.data();
    const snap=await db.collection("getraenke_bewegung").where("lager","==",currentLager).where("monat","==",currentZeitraum).get();
    bewegungen=[];
    snap.forEach(d=>bewegungen.push({id:d.id,...d.data()}));
    bewegungen.sort((a,b)=>a.datum.localeCompare(b.datum));
    hideSpinner();
    renderTable();
    renderGesamt();
  }catch(e){hideSpinner();showToast("Fehler: "+e.message,"var(--neon-magenta)")}
}
function getDaysInMonth(zeitraum){
  const [y,m]=zeitraum.split("-").map(Number);
  return new Date(y,m,0).getDate();
}

function calcBestand(prodId, upToDay, zeitraum){
  const ab=Number(anfangsbestand[prodId]??0);
  let e=0,g=0,t=0;
  bewegungen.forEach(b=>{
    const day=parseInt(b.datum.slice(8));
    if(b.monat!==zeitraum&&!b.datum.startsWith(zeitraum)) return;
    if(day>upToDay) return;
    const v=b.items&&b.items[prodId]?Number(b.items[prodId]):0;
    if(b.type==="einkauf") e+=v;
    else if(b.type==="geraet") g+=v;
    else if(b.type==="theke") t+=v;
  });
  return ab+e+g-t;
}

function renderTable(){
  const totalDays=getDaysInMonth(currentZeitraum);
  // Build day range: show all days but only render cols if there's data
  // Find which days have any bewegung
  const activeDays=new Set(bewegungen.map(b=>parseInt(b.datum.slice(8))));

  // HEADER ROW 1: day numbers (spanning 4 cols each)
  let th1="<tr><th class='col-artikel' rowspan='2'>Artikel</th><th class='th-anfang' rowspan='2'>Anfangs-<br>bestand</th>";
  for(let d=1;d<=totalDays;d++){
    if(activeDays.has(d)){
      th1+=`<th colspan='4' class='th-day day-sep'>${d}.</th>`;
    }
  }
  th1+="<th class='th-ges-e' rowspan='2'>Einkauf<br>Ges.</th>";
  th1+="<th class='th-ges-g' rowspan='2'>Gerät<br>Ges.</th>";
  th1+="<th class='th-ges-t' rowspan='2'>Theke<br>Ges.</th>";
  th1+="<th class='th-end' rowspan='2'>End-<br>bestand</th></tr>";

  // HEADER ROW 2: Einkauf | Gerät | Theke | Bestand per active day
  let th2="<tr>";
  for(let d=1;d<=totalDays;d++){
    if(activeDays.has(d)){
      th2+=`<th class='th-einkauf day-sep'>Einkauf</th>`;
      th2+=`<th class='th-geraet'>Gerät</th>`;
      th2+=`<th class='th-theke'>Theke</th>`;
      th2+=`<th class='th-bestand'>Bestand</th>`;
    }
  }
  th2+="</tr>";
  document.getElementById("g-thead").innerHTML=th1+th2;

  // BODY
  let tbHTML="";
  PRODUCTS.forEach((cat,ci)=>{
    tbHTML+=`<tr class="cat-row ${ci===0?"open":""}" onclick="toggleCat(this)" data-cat="${ci}">
      <td class="col-artikel"><div class="cat-lbl"><span class="cat-arr">▶</span>${cat.cat}</div></td>
      <td colspan="999" style="background:rgba(0,0,0,.35)"></td></tr>`;
    cat.items.forEach(prod=>{
      const ab=Number(anfangsbestand[prod.id]??0);
      let tE=0,tG=0,tT=0;
      bewegungen.forEach(b=>{
        const v=b.items&&b.items[prod.id]?Number(b.items[prod.id]):0;
        if(b.type==="einkauf") tE+=v;
        else if(b.type==="geraet") tG+=v;
        else if(b.type==="theke") tT+=v;
      });
      const endbestand=ab+tE+tG-tT;
      tbHTML+=`<tr class="prod-row ${ci===0?"":"hidden"}" data-cat="${ci}">`;
      tbHTML+=`<td class="col-artikel"><div class="prod-info"><div class="prod-icon">${prod.icon}</div><div><div class="prod-name">${prod.name}</div><div class="prod-unit">${prod.unit}</div></div></div></td>`;
      tbHTML+=`<td class="td-anfang">${ab||"—"}</td>`;
      for(let d=1;d<=totalDays;d++){
        if(!activeDays.has(d)) continue;
        const bE=bewegungen.find(b=>parseInt(b.datum.slice(8))===d&&b.type==="einkauf");
        const bG=bewegungen.find(b=>parseInt(b.datum.slice(8))===d&&b.type==="geraet");
        const bT=bewegungen.find(b=>parseInt(b.datum.slice(8))===d&&b.type==="theke");
        const vE=bE&&bE.items&&bE.items[prod.id]?bE.items[prod.id]:null;
        const vG=bG&&bG.items&&bG.items[prod.id]?bG.items[prod.id]:null;
        const vT=bT&&bT.items&&bT.items[prod.id]?bT.items[prod.id]:null;
        const bestand=calcBestand(prod.id,d,currentZeitraum);
        tbHTML+=`<td class="td-einkauf day-sep">${vE||""}</td>`;
        tbHTML+=`<td class="td-geraet">${vG||""}</td>`;
        tbHTML+=`<td class="td-theke">${vT||""}</td>`;
        tbHTML+=`<td class="td-bestand">${bestand}</td>`;
      }
      tbHTML+=`<td class="td-einkauf">${tE||""}</td>`;
      tbHTML+=`<td class="td-geraet">${tG||""}</td>`;
      tbHTML+=`<td class="td-theke">${tT||""}</td>`;
      tbHTML+=`<td class="td-end">${endbestand}</td>`;
      tbHTML+="</tr>";
    });
  });
  document.getElementById("g-tbody").innerHTML=tbHTML;
}
function toggleCat(row){const ci=row.dataset.cat;const open=row.classList.toggle("open");document.querySelectorAll(`#g-tbody .prod-row[data-cat="${ci}"]`).forEach(r=>r.classList.toggle("hidden",!open))}
function toggleGesamt(){document.getElementById("gesamt-panel").classList.toggle("open")}
function renderGesamt(){
  const totals={};PRODUCTS.forEach(cat=>cat.items.forEach(p=>{totals[p.id]={einkauf:0,geraet:0,theke:0,name:p.name,icon:p.icon}}));
  bewegungen.forEach(b=>{if(!b.items)return;Object.keys(b.items).forEach(id=>{if(!totals[id])return;totals[id][b.type||"einkauf"]+=Number(b.items[id])||0})});
  const render=(type,color)=>Object.values(totals).filter(p=>p[type]>0).map(p=>`<div class="ges-row"><span>${p.icon} ${p.name}</span><span class="ges-val" style="color:${color}">${p[type]}</span></div>`).join("")||`<div style="color:var(--text-dim);font-size:.82rem;padding:.3rem 0">Keine Daten</div>`;
  document.getElementById("ges-einkauf").innerHTML=render("einkauf","var(--col-einkauf)");
  document.getElementById("ges-geraet").innerHTML=render("geraet","var(--col-geraet)");
  document.getElementById("ges-theke").innerHTML=render("theke","var(--col-theke)");
}
function openModal(type){
  currentType=type;
  document.getElementById("modal-title").textContent=type==="einkauf"?"🟢 Einkauf erfassen":"🔵 Gerätauffüllung erfassen";
  document.getElementById("modal-title").className="modal-title "+type;
  document.getElementById("btn-submit").className="btn-submit "+type;
  document.getElementById("form-date").value=new Date().toISOString().slice(0,10);
  let html="";
  PRODUCTS.forEach((cat,ci)=>{
    html+=`<div class="form-cat-hdr" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">${cat.cat}</div><div>`;
    cat.items.forEach(prod=>{html+=`<div class="form-row"><div class="form-icon">${prod.icon}</div><span class="form-name">${prod.name}</span><span class="form-unit">${prod.unit||""}</span><input class="form-qty ${type}" type="number" min="0" placeholder="0" data-id="${prod.id}"></div>`});
    html+="</div>";
  });
  document.getElementById("form-list").innerHTML=html;
  document.getElementById("modal-form").classList.add("show");
}
function closeModal(){document.getElementById("modal-form").classList.remove("show")}
async function submitForm(){
  const date=document.getElementById("form-date").value;
  if(!date){showToast("Datum fehlt","var(--neon-yellow)");return}
  const items={};
  document.querySelectorAll(".form-qty").forEach(inp=>{if(inp.value&&parseInt(inp.value)>0)items[inp.dataset.id]=parseInt(inp.value)});
  if(!Object.keys(items).length){showToast("Keine Mengen eingegeben","var(--neon-yellow)");return}
  showSpinner();
  try{
    await db.collection("getraenke_bewegung").add({lager:currentLager,monat:currentZeitraum,datum:date,type:currentType,items,mitarbeiter:currentUser,createdAt:new Date().toISOString()});
    hideSpinner();closeModal();
    showToast(currentType==="einkauf"?"Einkauf gespeichert! ✓":"Gerätauffüllung gespeichert! ✓");
    loadData();
  }catch(e){hideSpinner();showToast("Fehler: "+e.message,"var(--neon-magenta)")}
}
document.addEventListener("DOMContentLoaded",loadData);
</script>
</body>
</html>
