<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Thekenverkauf – GAME GALAXY</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');
:root{--bg:#050510;--neon-cyan:#00f5ff;--neon-magenta:#ff00cc;--text:#e0e8ff;--text-dim:#7080a0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.empty{text-align:center;position:relative;z-index:1}
.empty h1{font-family:'Orbitron',sans-serif;font-size:1.4rem;letter-spacing:.2em;background:linear-gradient(90deg,var(--neon-cyan),var(--neon-magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.8rem}
.empty p{color:var(--text-dim);font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.5rem}
.back{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#000;background:linear-gradient(135deg,var(--neon-cyan),#0088cc);border:none;border-radius:6px;padding:.6rem 1.2rem;cursor:pointer;text-decoration:none;display:inline-block}
</style>
</head>
<body>
<div class="empty">
  <h1>Thekenverkauf</h1>
  <p>Inhalt folgt</p>
  <a class="back" href="javascript:history.back()">&#8592; Zurück</a>
</div>
</body>
</html>
